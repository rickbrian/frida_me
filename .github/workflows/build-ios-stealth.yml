name: Build iOS Stealth Frida

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Frida version tag (leave empty for latest)"
        required: false
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-ios-stealth.yml"
      - "scripts/**"
  schedule:
    - cron: "0 9/12 * * *"

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # ── Resolve version ──
      - name: Get Frida version
        id: frida
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.frida_version }}" ]; then
            VER="${{ github.event.inputs.frida_version }}"
          else
            VER=$(curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/frida/frida/releases/latest \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name', ''))")
            if [ -z "$VER" ]; then
              echo "::error::Failed to get Frida version from API"
              exit 1
            fi
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Frida version: $VER"

      # ── Skip if already released (schedule only) ──
      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth")
          if [ "$CODE" = "200" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists, skipping (schedule trigger)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Delete old release on re-trigger ──
      - name: Delete existing release if re-trigger
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth")
          if [ "$CODE" = "200" ]; then
            echo "Deleting old release..."
            RELEASE_ID=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            curl -s -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            git push --delete origin "${{ steps.frida.outputs.version }}-ios-stealth" || true
          fi

      # ── Clone Frida ──
      - name: Clone Frida source
        if: steps.check.outputs.skip != 'true'
        env:
          FRIDA_VERSION: ${{ steps.frida.outputs.version }}
        run: |
          git clone https://github.com/frida/frida frida-build \
            --branch "$FRIDA_VERSION" --depth 1
          cd frida-build
          git submodule update --init --depth 1 \
            subprojects/frida-gum \
            subprojects/frida-core \
            releng

      # ── Apply source-level stealth patches ──
      - name: Apply stealth patches
        if: steps.check.outputs.skip != 'true'
        run: bash scripts/apply-ios-stealth.sh frida-build

      # ── Configure + Build ──
      - name: Configure
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: |
          ./configure \
            --prefix=/var/jb/usr \
            --host=ios-arm64e \
            --enable-server \
            -- \
            -Dfrida-core:assets=installed \
            -Dfrida-core:compiler_backend=disabled

      - name: Build
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: make -j$(sysctl -n hw.ncpu)

      - name: Install to staging
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: DESTDIR="$PWD/dist" make install

      # ── Post-build binary patching ──
      - name: Patch binaries
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 scripts/anti-anti-frida-macho.py \
            frida-build/dist/var/jb/usr/bin/frida-server \
            frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib

          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            python3 scripts/anti-anti-frida-macho.py \
              frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper
          fi

      # ── Re-sign ──
      - name: Create entitlements and re-sign
        if: steps.check.outputs.skip != 'true'
        run: |
          cat > ent.plist << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.springboard.debugapplications</key> <true/>
            <key>get-task-allow</key> <true/>
            <key>task_for_pid-allow</key> <true/>
            <key>run-unsigned-code</key> <true/>
            <key>com.apple.private.cs.debugger</key> <true/>
            <key>com.apple.private.skip-library-validation</key> <true/>
            <key>com.apple.backboardd.debugapplications</key> <true/>
            <key>com.apple.backboardd.launchapplications</key> <true/>
            <key>com.apple.frontboard.debugapplications</key> <true/>
            <key>com.apple.frontboard.launchapplications</key> <true/>
            <key>com.apple.security.network.client</key> <true/>
            <key>com.apple.security.network.server</key> <true/>
            <key>platform-application</key> <true/>
          </dict>
          </plist>
          ENTEOF

          # frida-server needs entitlements
          codesign -f -s "-" --entitlements ent.plist \
            frida-build/dist/var/jb/usr/bin/frida-server

          codesign -f -s "-" \
            frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib

          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            codesign -f -s "-" --entitlements ent.plist \
              frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper
          fi

      # ── Install dpkg (macOS doesn't have it) ──
      - name: Install dpkg
        if: steps.check.outputs.skip != 'true'
        run: brew install dpkg

      # ── Package ──
      - name: Package release assets
        if: steps.check.outputs.skip != 'true'
        env:
          FRIDA_VERSION: ${{ steps.frida.outputs.version }}
        run: |
          mkdir -p release

          # 单独的二进制文件
          cp frida-build/dist/var/jb/usr/bin/frida-server release/fs17910
          cp frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib release/fs17910d.dylib
          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            cp frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper release/fs17910h
          fi

          # 打 .deb 包（rootless: 全部装到 /var/jb/ 下，路径无 frida）
          DEB_ROOT="deb-build"
          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/var/jb/usr/sbin"
          mkdir -p "$DEB_ROOT/var/jb/usr/lib/fs179-1.0"
          mkdir -p "$DEB_ROOT/var/jb/Library/LaunchDaemons"

          cp frida-build/dist/var/jb/usr/bin/frida-server "$DEB_ROOT/var/jb/usr/sbin/fs17910"
          cp frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib "$DEB_ROOT/var/jb/usr/lib/fs179-1.0/fs179-agent.dylib"
          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            cp frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper "$DEB_ROOT/var/jb/usr/lib/fs179-1.0/fs179-helper"
            chmod 0755 "$DEB_ROOT/var/jb/usr/lib/fs179-1.0/fs179-helper"
          fi
          chmod 0755 "$DEB_ROOT/var/jb/usr/sbin/fs17910"

          # LaunchDaemon — 安装后自动启动，崩溃后限速重试
          cat > "$DEB_ROOT/var/jb/Library/LaunchDaemons/com.local.fs17910.plist" << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Label</key>
            <string>com.local.fs17910</string>
            <key>Program</key>
            <string>/var/jb/usr/sbin/fs17910</string>
            <key>ProgramArguments</key>
            <array>
              <string>/var/jb/usr/sbin/fs17910</string>
            </array>
            <key>RunAtLoad</key>
            <true/>
            <key>KeepAlive</key>
            <false/>
            <key>UserName</key>
            <string>root</string>
          </dict>
          </plist>
          PLISTEOF
          sed -i '' 's/^          //' "$DEB_ROOT/var/jb/Library/LaunchDaemons/com.local.fs17910.plist"

          # postinst — dpkg 安装后加载 daemon
          cat > "$DEB_ROOT/DEBIAN/postinst" << 'POSTEOF'
          #!/bin/bash
          chown root:wheel /var/jb/Library/LaunchDaemons/com.local.fs17910.plist
          chmod 644 /var/jb/Library/LaunchDaemons/com.local.fs17910.plist
          launchctl unload /var/jb/Library/LaunchDaemons/com.local.fs17910.plist 2>/dev/null
          launchctl load /var/jb/Library/LaunchDaemons/com.local.fs17910.plist
          POSTEOF
          sed -i '' 's/^          //' "$DEB_ROOT/DEBIAN/postinst"
          chmod 0755 "$DEB_ROOT/DEBIAN/postinst"

          # prerm — 卸载前停止 daemon
          cat > "$DEB_ROOT/DEBIAN/prerm" << 'PRERMEOF'
          #!/bin/bash
          launchctl unload /var/jb/Library/LaunchDaemons/com.local.fs17910.plist 2>/dev/null
          killall fs17910 2>/dev/null
          exit 0
          PRERMEOF
          sed -i '' 's/^          //' "$DEB_ROOT/DEBIAN/prerm"
          chmod 0755 "$DEB_ROOT/DEBIAN/prerm"

          cat > "$DEB_ROOT/DEBIAN/control" << CTRLEOF
          Package: com.local.fs17910
          Name: fs17910
          Version: ${FRIDA_VERSION}
          Architecture: iphoneos-arm64
          Description: system service daemon
          Maintainer: local
          Section: System
          CTRLEOF
          sed -i '' 's/^          //' "$DEB_ROOT/DEBIAN/control"

          dpkg-deb -b -Zxz "$DEB_ROOT" "release/fs17910_${FRIDA_VERSION}_iphoneos-arm64.deb"

      # ── Upload + Release ──
      - name: Upload build artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fs17910-ios-stealth
          path: release/*

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.frida.outputs.version }}-ios-stealth"
          name: "Stealth Frida ${{ steps.frida.outputs.version }} for iOS"
          prerelease: false
          files: |
            release/fs17910
            release/fs17910d.dylib
            release/fs17910h
            release/*.deb
          body: |
            ## iOS Stealth Frida Server

            基于 Frida **${{ steps.frida.outputs.version }}**

            ### 文件说明
            | 文件 | 说明 |
            |---|---|
            | `fs17910` | server 主程序 |
            | `fs17910d.dylib` | agent 动态库 |
            | `fs17910h` | helper |
            | `fs17910_*_iphoneos-arm64.deb` | 一键安装包 |

            ### 方式一：deb 安装（推荐，装完自动启动）
            ```bash
            # palera1n rootless 越狱
            scp fs17910_*_iphoneos-arm64.deb root@DEVICE:/var/tmp/
            ssh root@DEVICE "dpkg -i /var/tmp/fs17910_*.deb"
            # 装完即自动运行，重启设备也会自动拉起，无需手动操作
            ```

            卸载：
            ```bash
            ssh root@DEVICE "dpkg -r com.local.fs17910"
            ```

            ### 方式二：手动部署
            ```bash
            scp fs17910 fs17910d.dylib fs17910h root@DEVICE:/var/tmp/
            ssh root@DEVICE
            mkdir -p /var/jb/usr/lib/fs179-1.0
            mv /var/tmp/fs17910d.dylib /var/jb/usr/lib/fs179-1.0/fs179-agent.dylib
            mv /var/tmp/fs17910h /var/jb/usr/lib/fs179-1.0/fs179-helper
            chmod +x /var/tmp/fs17910 /var/jb/usr/lib/fs179-1.0/fs179-helper
            /var/tmp/fs17910 &
            ```

            ### 电脑端连接
            ```bash
            # USB 模式（默认，推荐）
            frida -U -f com.target.app -l script.js

            # Wi-Fi 模式（需要设备端加 --listen 参数启动）
            frida -H DEVICE_IP:8899 -f com.target.app -l script.js
            ```

            > 💡 `frida -U` / `frida -H` 在电脑上运行，不会被设备上的 app 检测到
            > 💡 此 deb 适配 **palera1n rootless** 越狱，文件安装到 `/var/jb/` 下
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
