name: Build iOS Stealth Frida

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Frida version tag (leave empty for latest)"
        required: false
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-ios-stealth.yml"
      - "scripts/**"
  schedule:
    - cron: "0 9/12 * * *"

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # ── Resolve version ──
      - name: Get Frida version
        id: frida
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.frida_version }}" ]; then
            VER="${{ github.event.inputs.frida_version }}"
          else
            VER=$(curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/frida/frida/releases/latest \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name', ''))")
            if [ -z "$VER" ]; then
              echo "::error::Failed to get Frida version from API"
              exit 1
            fi
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Frida version: $VER"

      # ── Skip if already released (schedule only) ──
      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth")
          if [ "$CODE" = "200" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists, skipping (schedule trigger)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Delete old release on re-trigger ──
      - name: Delete existing release if re-trigger
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth")
          if [ "$CODE" = "200" ]; then
            echo "Deleting old release..."
            RELEASE_ID=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            curl -s -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            git push --delete origin "${{ steps.frida.outputs.version }}-ios-stealth" || true
          fi

      # ── Clone Frida ──
      - name: Clone Frida source
        if: steps.check.outputs.skip != 'true'
        env:
          FRIDA_VERSION: ${{ steps.frida.outputs.version }}
        run: |
          git clone https://github.com/frida/frida frida-build \
            --branch "$FRIDA_VERSION" --depth 1
          cd frida-build
          git submodule update --init --depth 1 \
            subprojects/frida-gum \
            subprojects/frida-core \
            releng

      # ── Apply source-level stealth patches ──
      - name: Apply stealth patches
        if: steps.check.outputs.skip != 'true'
        run: bash scripts/apply-ios-stealth.sh frida-build

      # ── Configure + Build ──
      - name: Configure
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: |
          ./configure \
            --prefix=/usr \
            --host=ios-arm64e \
            --enable-server \
            -- \
            -Dfrida-core:assets=installed \
            -Dfrida-core:compiler_backend=disabled

      - name: Build
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: make -j$(sysctl -n hw.ncpu)

      - name: Install to staging
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: DESTDIR="$PWD/dist" make install

      # ── Post-build binary patching ──
      - name: Patch binaries
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 scripts/anti-anti-frida-macho.py \
            frida-build/dist/usr/bin/frida-server \
            frida-build/dist/usr/lib/frida-1.0/frida-agent.dylib

          if [ -f "frida-build/dist/usr/lib/frida-1.0/frida-helper" ]; then
            python3 scripts/anti-anti-frida-macho.py \
              frida-build/dist/usr/lib/frida-1.0/frida-helper
          fi

      # ── Re-sign ──
      - name: Create entitlements and re-sign
        if: steps.check.outputs.skip != 'true'
        run: |
          cat > ent.plist << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.springboard.debugapplications</key> <true/>
            <key>get-task-allow</key> <true/>
            <key>task_for_pid-allow</key> <true/>
            <key>run-unsigned-code</key> <true/>
            <key>com.apple.private.cs.debugger</key> <true/>
            <key>com.apple.private.skip-library-validation</key> <true/>
            <key>com.apple.backboardd.debugapplications</key> <true/>
            <key>com.apple.backboardd.launchapplications</key> <true/>
            <key>com.apple.frontboard.debugapplications</key> <true/>
            <key>com.apple.frontboard.launchapplications</key> <true/>
            <key>com.apple.security.network.client</key> <true/>
            <key>com.apple.security.network.server</key> <true/>
            <key>platform-application</key> <true/>
          </dict>
          </plist>
          ENTEOF

          # frida-server needs entitlements
          codesign -f -s "-" --entitlements ent.plist \
            frida-build/dist/usr/bin/frida-server

          codesign -f -s "-" \
            frida-build/dist/usr/lib/frida-1.0/frida-agent.dylib

          if [ -f "frida-build/dist/usr/lib/frida-1.0/frida-helper" ]; then
            codesign -f -s "-" --entitlements ent.plist \
              frida-build/dist/usr/lib/frida-1.0/frida-helper
          fi

      # ── Package ──
      - name: Package release assets
        if: steps.check.outputs.skip != 'true'
        env:
          FRIDA_VERSION: ${{ steps.frida.outputs.version }}
        run: |
          mkdir -p release

          cp frida-build/dist/usr/bin/frida-server release/fs17910
          cp frida-build/dist/usr/lib/frida-1.0/frida-agent.dylib release/fs17910d.dylib
          if [ -f "frida-build/dist/usr/lib/frida-1.0/frida-helper" ]; then
            cp frida-build/dist/usr/lib/frida-1.0/frida-helper release/fs17910h
          fi

      # ── Upload + Release ──
      - name: Upload build artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fs17910-ios-stealth
          path: release/fs17910-*

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.frida.outputs.version }}-ios-stealth"
          name: "Stealth Frida ${{ steps.frida.outputs.version }} for iOS"
          prerelease: false
          files: release/fs17910-*
          body: |
            ## iOS Stealth Frida Server

            基于 Frida **${{ steps.frida.outputs.version }}**，包含以下隐身改动：

            ### 源码级改动
            - `frida:rpc` 协议字符串 → base64 双重编码（运行时兼容官方客户端）
            - `frida_agent_main` 符号 → `main`
            - `g_set_prgname("frida")` → `com.apple.WebKit`（消除 `pool-frida` 线程）
            - `gum-js-loop` 线程 → `com.apple.CFSocket.private`
            - `frida-eternal-agent` / `frida-agent-emulated` → `com.apple.CFStream`
            - `frida-generate-certificate` → `com.apple.securityd`
            - Agent dylib 名称随机化
            - ExitMonitor 默认禁用（去掉 exit/abort 的 inline hook，消除 rwxp 段）

            ### 二进制级改动
            - `frida-server` / `frida-agent` / `frida-helper` 名称 → `fs17910` / `fs17910d` / `fs17910h`
            - `re.frida.server` → 随机标识
            - `FridaScriptEngine`, `GDBusProxy`, `GumScript`, `GLib-GIO` → 反转
            - 剩余 `frida` / `FRIDA` 字符串 → 随机替换
            - `gmain`, `gdbus` 线程名 → 随机

            ### 部署方式
            ```bash
            # 1. 解压
            tar xzf fs17910-server-*-ios-universal.tar.gz

            # 2. 传到设备（自定义路径 + 自定义端口）
            scp fs17910 fs17910d.dylib root@DEVICE:/var/tmp/

            # 3. 设备上启动（用自定义端口避免 27042 检测）
            ssh root@DEVICE
            mkdir -p /usr/lib/frida-1.0
            cp /var/tmp/fs17910d.dylib /usr/lib/frida-1.0/frida-agent.dylib
            chmod +x /var/tmp/fs17910
            /var/tmp/fs17910 --listen 0.0.0.0:8899 &

            # 4. 从电脑连接（用自定义端口）
            frida -H DEVICE_IP:8899 -f com.target.app -l script.js
            ```

            > ⚠️ 务必使用 `--listen 0.0.0.0:自定义端口`，默认 27042 端口会被检测。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
