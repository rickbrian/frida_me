name: Build iOS Stealth Frida

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Frida version tag (leave empty for latest)"
        required: false
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-ios-stealth.yml"
      - "scripts/**"
  schedule:
    - cron: "0 9/12 * * *"

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # ── Resolve version ──
      - name: Get Frida version
        id: frida
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.frida_version }}" ]; then
            VER="${{ github.event.inputs.frida_version }}"
          else
            VER=$(curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/frida/frida/releases/latest \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name', ''))")
            if [ -z "$VER" ]; then
              echo "::error::Failed to get Frida version from API"
              exit 1
            fi
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Frida version: $VER"

      # ── Skip if already released (schedule only) ──
      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth")
          if [ "$CODE" = "200" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists, skipping (schedule trigger)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Delete old release on re-trigger ──
      - name: Delete existing release if re-trigger
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth")
          if [ "$CODE" = "200" ]; then
            echo "Deleting old release..."
            RELEASE_ID=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.frida.outputs.version }}-ios-stealth" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            curl -s -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            git push --delete origin "${{ steps.frida.outputs.version }}-ios-stealth" || true
          fi

      # ── Clone Frida ──
      - name: Clone Frida source
        if: steps.check.outputs.skip != 'true'
        env:
          FRIDA_VERSION: ${{ steps.frida.outputs.version }}
        run: |
          git clone https://github.com/frida/frida frida-build \
            --branch "$FRIDA_VERSION" --depth 1
          cd frida-build
          git submodule update --init --depth 1 \
            subprojects/frida-gum \
            subprojects/frida-core \
            releng

      # ── Apply source-level stealth patches ──
      - name: Apply stealth patches
        if: steps.check.outputs.skip != 'true'
        run: bash scripts/apply-ios-stealth.sh frida-build

      # ── Configure + Build (arm64e: server + gadget + devkit) ──
      - name: Configure (arm64e)
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: |
          ./configure \
            --prefix=/var/jb/usr \
            --host=ios-arm64e \
            --enable-server \
            --enable-gadget \
            -- \
            -Dfrida-core:assets=installed \
            -Dfrida-core:compiler_backend=disabled \
            -Dfrida-gum:devkits=gum,gumjs \
            -Db_lto=true \
            -Doptimization=s \
            -Dstrip=true

      - name: Build (arm64e)
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: make -j$(sysctl -n hw.ncpu)

      - name: Install to staging
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: DESTDIR="$PWD/dist" make install

      # ── Extract arm64e devkit from build tree ──
      - name: Extract arm64e devkit
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "=== Everything inside devkit directories ==="
          find frida-build/build -path '*devkit*' -type f 2>/dev/null

          echo ""
          echo "=== All .a files in build tree (first 30) ==="
          find frida-build/build -name '*.a' 2>/dev/null | head -30

          for KIT in gumjs gum; do
            DIR="devkit-arm64e/${KIT}"
            mkdir -p "$DIR"

            # 在 devkit 目录里找，匹配 frida-xxx.a 或 libfrida-xxx.a
            DEVKIT_DIR=$(find frida-build/build -type d -path "*/${KIT}/devkit" 2>/dev/null | head -1)
            if [ -n "$DEVKIT_DIR" ]; then
              echo "${KIT} devkit dir: ${DEVKIT_DIR}"
              ls -la "$DEVKIT_DIR"/
              # 复制整个 devkit 目录内容
              cp "$DEVKIT_DIR"/* "$DIR/" 2>/dev/null || true
              # 如果 .a 叫 libfrida-xxx.a，重命名为 frida-xxx.a
              if [ -f "$DIR/libfrida-${KIT}.a" ] && [ ! -f "$DIR/frida-${KIT}.a" ]; then
                mv "$DIR/libfrida-${KIT}.a" "$DIR/frida-${KIT}.a"
              fi
            fi

            if [ -f "$DIR/frida-${KIT}.a" ]; then
              echo "[+] arm64e ${KIT}: $(du -h "$DIR/frida-${KIT}.a" | cut -f1)"
            else
              echo "::warning::arm64e ${KIT} .a not found in devkit dir"
            fi
          done

      # ── Build arm64 devkit (separate pass, no LTO for compatibility) ──
      - name: Configure (arm64 devkit)
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: |
          rm -rf build
          ./configure \
            --host=ios-arm64 \
            -- \
            -Dfrida-core:assets=installed \
            -Dfrida-core:compiler_backend=disabled \
            -Dfrida-gum:devkits=gum,gumjs \
            -Doptimization=s

      - name: Build (arm64 devkit)
        if: steps.check.outputs.skip != 'true'
        working-directory: frida-build
        env:
          IOS_CERTID: "-"
          MACOS_CERTID: "-"
        run: make -j$(sysctl -n hw.ncpu)

      - name: Extract arm64 devkit
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "=== arm64 devkit directories ==="
          find frida-build/build -path '*devkit*' -type f 2>/dev/null

          for KIT in gumjs gum; do
            DIR="devkit-arm64/${KIT}"
            mkdir -p "$DIR"

            DEVKIT_DIR=$(find frida-build/build -type d -path "*/${KIT}/devkit" 2>/dev/null | head -1)
            if [ -n "$DEVKIT_DIR" ]; then
              echo "${KIT} devkit dir: ${DEVKIT_DIR}"
              ls -la "$DEVKIT_DIR"/
              cp "$DEVKIT_DIR"/* "$DIR/" 2>/dev/null || true
              if [ -f "$DIR/libfrida-${KIT}.a" ] && [ ! -f "$DIR/frida-${KIT}.a" ]; then
                mv "$DIR/libfrida-${KIT}.a" "$DIR/frida-${KIT}.a"
              fi
            fi

            if [ -f "$DIR/frida-${KIT}.a" ]; then
              echo "[+] arm64 ${KIT}: $(du -h "$DIR/frida-${KIT}.a" | cut -f1)"
            else
              echo "::warning::arm64 ${KIT} .a not found in devkit dir"
            fi
          done

      # ── Post-build binary patching ──
      - name: Patch binaries
        if: steps.check.outputs.skip != 'true'
        run: |
          # Server / Agent / Helper
          python3 scripts/anti-anti-frida-macho.py \
            frida-build/dist/var/jb/usr/bin/frida-server \
            frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib

          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            python3 scripts/anti-anti-frida-macho.py \
              frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper
          fi

          # Gadget
          GADGET=$(find frida-build/dist -name 'frida-gadget.dylib' -o -name 'FridaGadget.dylib' 2>/dev/null | head -1)
          if [ -n "$GADGET" ]; then
            echo "Patching gadget: $GADGET"
            python3 scripts/anti-anti-frida-macho.py "$GADGET"
          else
            echo "::warning::Gadget dylib not found in dist/"
            find frida-build -name '*gadget*' -name '*.dylib' 2>/dev/null
          fi

          # Devkit .a 静态库 — 等长替换对 ar 归档格式安全
          echo ""
          echo "=== Patching devkit static libraries ==="
          for arch in arm64e arm64; do
            for kit in gumjs gum; do
              LIB="devkit-${arch}/${kit}/frida-${kit}.a"
              if [ -f "$LIB" ]; then
                python3 scripts/anti-anti-frida-macho.py "$LIB"
              fi
            done
          done

      # ── Strip symbols ──
      - name: Strip binaries
        if: steps.check.outputs.skip != 'true'
        run: |
          # server / helper: full strip (standalone executables)
          strip frida-build/dist/var/jb/usr/bin/frida-server 2>/dev/null || true
          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            strip frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper 2>/dev/null || true
          fi

          # agent / gadget: strip -x (keep global symbols for dlsym)
          strip -x frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib 2>/dev/null || true
          GADGET=$(find frida-build/dist -name 'frida-gadget.dylib' -o -name 'FridaGadget.dylib' 2>/dev/null | head -1)
          if [ -n "$GADGET" ]; then
            strip -x "$GADGET" 2>/dev/null || true
          fi

          # devkit .a: strip -S (remove debug info, keep all linking symbols)
          for arch in arm64e arm64; do
            for kit in gumjs gum; do
              LIB="devkit-${arch}/${kit}/frida-${kit}.a"
              if [ -f "$LIB" ]; then
                BEFORE=$(du -h "$LIB" | cut -f1)
                strip -S "$LIB" 2>/dev/null || true
                AFTER=$(du -h "$LIB" | cut -f1)
                echo "strip -S ${arch}/${kit}: ${BEFORE} -> ${AFTER}"
              fi
            done
          done

      # ── Re-sign ──
      - name: Create entitlements and re-sign
        if: steps.check.outputs.skip != 'true'
        run: |
          cat > ent.plist << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.springboard.debugapplications</key> <true/>
            <key>get-task-allow</key> <true/>
            <key>task_for_pid-allow</key> <true/>
            <key>run-unsigned-code</key> <true/>
            <key>com.apple.private.cs.debugger</key> <true/>
            <key>com.apple.private.skip-library-validation</key> <true/>
            <key>com.apple.backboardd.debugapplications</key> <true/>
            <key>com.apple.backboardd.launchapplications</key> <true/>
            <key>com.apple.frontboard.debugapplications</key> <true/>
            <key>com.apple.frontboard.launchapplications</key> <true/>
            <key>com.apple.security.network.client</key> <true/>
            <key>com.apple.security.network.server</key> <true/>
            <key>platform-application</key> <true/>
          </dict>
          </plist>
          ENTEOF

          # frida-server needs entitlements
          codesign -f -s "-" --entitlements ent.plist \
            frida-build/dist/var/jb/usr/bin/frida-server

          codesign -f -s "-" \
            frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib

          # Sign gadget
          GADGET=$(find frida-build/dist -name 'frida-gadget.dylib' -o -name 'FridaGadget.dylib' 2>/dev/null | head -1)
          if [ -n "$GADGET" ]; then
            codesign -f -s "-" "$GADGET"
          fi

          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            codesign -f -s "-" --entitlements ent.plist \
              frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper
          fi

      # ── Install dpkg (macOS doesn't have it) ──
      - name: Install dpkg
        if: steps.check.outputs.skip != 'true'
        run: brew install dpkg

      # ── Package ──
      - name: Package release assets
        if: steps.check.outputs.skip != 'true'
        env:
          FRIDA_VERSION: ${{ steps.frida.outputs.version }}
        run: |
          mkdir -p release

          # 单独的二进制文件
          cp frida-build/dist/var/jb/usr/bin/frida-server release/fs17910
          cp frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib release/fs17910d.dylib
          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            cp frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper release/fs17910h
          fi

          # Gadget — 找到编译产物并打包
          GADGET=$(find frida-build/dist -name 'frida-gadget.dylib' -o -name 'FridaGadget.dylib' 2>/dev/null | head -1)
          if [ -n "$GADGET" ]; then
            cp "$GADGET" release/fs17910-gadget.dylib
            echo "Gadget packaged: $GADGET -> release/fs17910-gadget.dylib"
          fi

          # 打 .deb 包（rootless: 全部装到 /var/jb/ 下，路径无 frida）
          DEB_ROOT="deb-build"
          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/var/jb/usr/sbin"
          mkdir -p "$DEB_ROOT/var/jb/usr/lib/fs179-1.0"
          mkdir -p "$DEB_ROOT/var/jb/Library/LaunchDaemons"

          cp frida-build/dist/var/jb/usr/bin/frida-server "$DEB_ROOT/var/jb/usr/sbin/fs17910"
          cp frida-build/dist/var/jb/usr/lib/frida-1.0/frida-agent.dylib "$DEB_ROOT/var/jb/usr/lib/fs179-1.0/fs179-agent.dylib"
          if [ -f "frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper" ]; then
            cp frida-build/dist/var/jb/usr/lib/frida-1.0/frida-helper "$DEB_ROOT/var/jb/usr/lib/fs179-1.0/fs179-helper"
            chmod 0755 "$DEB_ROOT/var/jb/usr/lib/fs179-1.0/fs179-helper"
          fi
          chmod 0755 "$DEB_ROOT/var/jb/usr/sbin/fs17910"

          # LaunchDaemon — 安装后自动启动，崩溃后限速重试
          cat > "$DEB_ROOT/var/jb/Library/LaunchDaemons/com.local.fs17910.plist" << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Label</key>
            <string>com.local.fs17910</string>
            <key>Program</key>
            <string>/var/jb/usr/sbin/fs17910</string>
            <key>ProgramArguments</key>
            <array>
              <string>/var/jb/usr/sbin/fs17910</string>
            </array>
            <key>RunAtLoad</key>
            <true/>
            <key>KeepAlive</key>
            <true/>
            <key>ThrottleInterval</key>
            <integer>30</integer>
            <key>UserName</key>
            <string>root</string>
          </dict>
          </plist>
          PLISTEOF
          sed -i '' 's/^          //' "$DEB_ROOT/var/jb/Library/LaunchDaemons/com.local.fs17910.plist"

          # postinst — dpkg 安装后加载 daemon
          cat > "$DEB_ROOT/DEBIAN/postinst" << 'POSTEOF'
          #!/bin/bash
          chown root:wheel /var/jb/Library/LaunchDaemons/com.local.fs17910.plist
          chmod 644 /var/jb/Library/LaunchDaemons/com.local.fs17910.plist
          launchctl unload /var/jb/Library/LaunchDaemons/com.local.fs17910.plist 2>/dev/null
          launchctl load /var/jb/Library/LaunchDaemons/com.local.fs17910.plist
          POSTEOF
          sed -i '' 's/^          //' "$DEB_ROOT/DEBIAN/postinst"
          chmod 0755 "$DEB_ROOT/DEBIAN/postinst"

          # prerm — 卸载前停止 daemon
          cat > "$DEB_ROOT/DEBIAN/prerm" << 'PRERMEOF'
          #!/bin/bash
          launchctl unload /var/jb/Library/LaunchDaemons/com.local.fs17910.plist 2>/dev/null
          killall fs17910 2>/dev/null
          exit 0
          PRERMEOF
          sed -i '' 's/^          //' "$DEB_ROOT/DEBIAN/prerm"
          chmod 0755 "$DEB_ROOT/DEBIAN/prerm"

          cat > "$DEB_ROOT/DEBIAN/control" << CTRLEOF
          Package: com.local.fs17910
          Name: fs17910
          Version: ${FRIDA_VERSION}
          Architecture: iphoneos-arm64
          Description: system service daemon
          Maintainer: local
          Section: System
          CTRLEOF
          sed -i '' 's/^          //' "$DEB_ROOT/DEBIAN/control"

          dpkg-deb -b -Zxz "$DEB_ROOT" "release/fs17910_${FRIDA_VERSION}_iphoneos-arm64.deb"

          # ── Devkit tar.xz 打包 ──
          for arch in arm64e arm64; do
            for kit in gumjs gum; do
              DIR="devkit-${arch}/${kit}"
              if [ -f "${DIR}/frida-${kit}.a" ]; then
                TARNAME="stealth-frida-${kit}-devkit-${FRIDA_VERSION}-ios-${arch}.tar.xz"
                tar -cJf "release/${TARNAME}" -C "${DIR}" .
                echo "Packed: ${TARNAME} ($(du -h "release/${TARNAME}" | cut -f1))"
              fi
            done
          done

      # ── Upload + Release ──
      - name: Upload build artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fs17910-ios-stealth
          path: release/*

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.frida.outputs.version }}-ios-stealth"
          name: "Stealth Frida ${{ steps.frida.outputs.version }} for iOS"
          prerelease: false
          files: |
            release/fs17910
            release/fs17910d.dylib
            release/fs17910h
            release/fs17910-gadget.dylib
            release/*.deb
            release/stealth-frida-gumjs-devkit-*.tar.xz
            release/stealth-frida-gum-devkit-*.tar.xz
          body: |
            ## iOS Stealth Frida ${{ steps.frida.outputs.version }}

            源码级隐匿 + 二进制 patch，线程名/segment名/字符串特征全部处理。

            ### 产物说明

            #### 一、Server（传统 frida-server 模式）
            | 文件 | 说明 |
            |---|---|
            | `fs17910` | stealth server 主程序 (arm64e) |
            | `fs17910d.dylib` | stealth agent 动态库 |
            | `fs17910h` | helper |
            | `fs17910-gadget.dylib` | stealth Gadget（嵌入 IPA 用） |
            | `fs17910_*_iphoneos-arm64.deb` | 一键安装包（自动启动） |

            #### 二、GumJS Devkit（自编译 dylib，无 frida-server 特征）
            | 文件 | 说明 |
            |---|---|
            | `stealth-frida-gumjs-devkit-*-ios-arm64e.tar.xz` | A12+ 真机 (iPhone XS 及以后) |
            | `stealth-frida-gumjs-devkit-*-ios-arm64.tar.xz` | A8–A11 真机 (iPhone 6s ~ X) |
            | `stealth-frida-gum-devkit-*-ios-arm64e.tar.xz` | C-only API (arm64e) |
            | `stealth-frida-gum-devkit-*-ios-arm64.tar.xz` | C-only API (arm64) |

            每个 devkit 包含：
            - `frida-gumjs.h` / `frida-gum.h` — 头文件
            - `frida-gumjs.a` / `frida-gum.a` — 静态库（已去除 frida 特征字符串）
            - `frida-gumjs-example.c` / `frida-gum-example.c` — 示例代码

            ---

            ### 用法一：deb 安装 stealth server（推荐入门）
            ```bash
            scp fs17910_*_iphoneos-arm64.deb root@DEVICE:/var/tmp/
            ssh root@DEVICE "dpkg -i /var/tmp/fs17910_*.deb"
            # 装完自动运行，重启设备也会自动拉起
            ```

            卸载：`ssh root@DEVICE "dpkg -r com.local.fs17910"`

            ### 用法二：GumJS Devkit 自编译 Tweak（终极隐匿）

            适用于 inline SVC 检测等 stealth server 也过不了的场景。
            无 frida-server 进程、无特征线程、无特征端口。

            ```bash
            # 1. 解压 devkit
            tar xf stealth-frida-gumjs-devkit-*-ios-arm64e.tar.xz -C devkit/

            # 2. 编译自定义 dylib
            clang -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
                  -target arm64e-apple-ios15.0 -shared \
                  -o MyBypass.dylib bypass.c \
                  -Ldevkit -lfrida-gumjs \
                  -framework Foundation -lresolv -lpthread
            strip -x MyBypass.dylib

            # 3. 打包为 Substrate/ElleKit tweak 安装到设备
            #    Filter plist 指定目标 bundle id
            ```

            ### 电脑端连接（server 模式）
            ```bash
            frida -U -f com.target.app -l script.js
            frida -H DEVICE_IP:8899 -f com.target.app -l script.js
            ```

            > 💡 GumJS devkit 的 .a 已经过 stealth patch，
            > 静态链接进你的 dylib 后不含 "frida"/"gum-js-loop" 等特征字符串
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
